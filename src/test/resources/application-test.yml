spring:
  datasource:
    # 메인 프로젝트를 실행하지 않고, 배치만 독립적으로 검증하기 위한 인메모리 DB.
    url: jdbc:h2:mem:batchtest;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: none
    show-sql: true

  sql:
    init:
      mode: always
      schema-locations: classpath:schema-test.sql
      data-locations: classpath:data-test.sql

  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: always
      # 테스트에서는 H2 용 배치 메타데이터 스키마를 사용한다.
      schema: classpath:org/springframework/batch/core/schema-h2.sql

batch:
  run-on-startup: false
  scheduler:
    enabled: false
  ranking:
    top-n: 100
